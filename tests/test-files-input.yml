name: Test files input - detect changed files
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Modify a file to simulate a change
        run: |
          echo "# test modification" >> README.md
      - id: action
        uses: .
        with:
          files: |
            README.md
          separator: " "
      - name: Assert files_changed is true
        env:
          FILES_CHANGED: ${{ steps.action.outputs.files_changed }}
          CHANGED_FILES: ${{ steps.action.outputs.changed_files }}
        run: |
          echo "files_changed: $FILES_CHANGED"
          echo "changed_files: $CHANGED_FILES"
          if [ "$FILES_CHANGED" != "true" ]; then
            echo "FAIL: expected files_changed to be 'true' but got '$FILES_CHANGED'"
            exit 1
          fi
          if [ -z "$CHANGED_FILES" ]; then
            echo "FAIL: expected changed_files to be non-empty"
            exit 1
          fi
          echo "PASS"
