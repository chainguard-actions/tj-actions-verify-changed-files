name: Test basic usage - no changed files
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          fail-if-changed: "false"
          fail-if-unchanged: "false"
      - name: Assert files_changed is false
        env:
          FILES_CHANGED: ${{ steps.action.outputs.files_changed }}
        run: |
          echo "files_changed: $FILES_CHANGED"
          if [ "$FILES_CHANGED" != "false" ]; then
            echo "FAIL: expected files_changed to be 'false' on a clean checkout"
            exit 1
          fi
          echo "PASS"
      - name: Assert changed_files is empty
        env:
          CHANGED_FILES: ${{ steps.action.outputs.changed_files }}
        run: |
          echo "changed_files: '$CHANGED_FILES'"
          if [ -n "$CHANGED_FILES" ]; then
            echo "FAIL: expected changed_files to be empty on a clean checkout"
            exit 1
          fi
          echo "PASS"
