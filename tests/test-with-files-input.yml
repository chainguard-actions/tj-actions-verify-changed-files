name: Test with files input - detect changed files
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a modified file to detect
        run: |
          echo "test content $(date)" > test-changed-file.txt
      - id: action
        uses: .
        with:
          files: test-changed-file.txt
          fail-if-changed: "false"
          fail-if-unchanged: "false"
      - name: Assert files_changed is true
        env:
          FILES_CHANGED: ${{ steps.action.outputs.files_changed }}
        run: |
          echo "files_changed: $FILES_CHANGED"
          if [ "$FILES_CHANGED" != "true" ]; then
            echo "FAIL: expected files_changed to be 'true' after creating a new file"
            exit 1
          fi
          echo "PASS"
      - name: Assert changed_files contains the file
        env:
          CHANGED_FILES: ${{ steps.action.outputs.changed_files }}
        run: |
          echo "changed_files: '$CHANGED_FILES'"
          if [ -z "$CHANGED_FILES" ]; then
            echo "FAIL: expected changed_files to be non-empty"
            exit 1
          fi
          echo "PASS"
